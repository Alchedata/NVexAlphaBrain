# NeuroVLA 框架默认架构配置
framework:
  name: NeuroVLA
  qwenvl:
    # base_vlm: 通过 CLI 或 finetune_config.yaml 设置
    attn_implementation: sdpa
    vl_hidden_dim: 2048
  layer_qformer: 
    qformer_end_layer: 37
    qformer_start_layer: 36
    num_query_tokens: 8
    input_dim: 2048
    ouptput_dim: 768
    grad_scale: 0.5
    
  action_model: 
    hidden_size: 1024
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 7
    state_dim: 7
    future_action_window_size: 15
    action_horizon: 16
    past_action_window_size: 0
    repeated_diffusion_steps: 8
      
    
  reduce_in_full_precision: true
