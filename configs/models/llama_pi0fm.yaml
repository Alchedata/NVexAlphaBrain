# LlamaPi0FM 框架默认架构配置
# Llama 3.2 11B Vision + Layerwise Cross-Attention DiT (Flow Matching)
# Uses QwenPI/LlamaPi0FM framework with Llama backend
# DiT uses 18 layers @ 1024 hidden (not matching Llama's 40/4096)
# A learned projection maps VLM hidden_states (4096) → DiT hidden (1024)
framework:
  name: LlamaPi0FM
  llamavl:
    attn_implementation: sdpa
  action_model:
    action_model_type: DiT-B
    action_hidden_dim: 1024
    hidden_size: 1024
    num_dit_layers: 18
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 7
    state_dim: 8
    future_action_window_size: 9
    action_horizon: 10
    past_action_window_size: 0
    repeated_diffusion_steps: 2
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 10
    num_target_vision_tokens: 16
    diffusion_model_cfg:
      cross_attention_dim: 1024
      dropout: 0.0
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 18
      output_dim: 1024
      positional_embeddings: null
  reduce_in_full_precision: true
