# DEPRECATED: This file is deprecated. Please use configs/finetune_config.yaml instead.
# Kept for reference to see the full parameter combination for QwenFM_OXE_SimplerEnv.

# QwenFM + OXE SimplerEnv (QwenGR00T framework for SimplerEnv evaluation)
_model_config_: configs/models/qwen_gr00t.yaml

run_id: qwenact
output_root_dir: results/training
seed: 42
is_debug: false

framework:
  qwenvl:
    base_vlm: ./data/pretrained_models/Qwen2.5-VL-3B-Instruct
  action_model:
    action_hidden_dim: 2560
    future_action_window_size: 15
    action_horizon: 16

datasets:
  vlm_data:
    dataloader_module: vlm_datasets
    dataformat: llava_json
    dataset_use: sharegpt4v_coco
    eval_dataset: sharegpt4v_coco
    data_flatten: false
    base_interval: 2
    max_pixels: 307200
    min_pixels: 784
    model_max_length: 2048
    model_type: qwen2.5vl
    per_device_batch_size: 4

  vla_data:
    dataloader_module: lerobot_datasets
    data_root_dir: data/datasets/OXE_LEROBOT_DATASET
    dataset_mix: bridge_rt_1
    action_type: delta_ee
    CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
    CoT_answer: bbox
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 16
    load_all_data_for_training: true
    obs: ["image_0"]
    image_size: [224,224]
    video_backend: torchvision_av

trainer:
  epochs: 100
  max_train_steps: 100000
  num_warmup_steps: 5000
  save_interval: 5000
  eval_interval: 100
  learning_rate:
    base: 1e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 5.0e-07
  freeze_modules: ''
  loss_scale:
    vla: 1.0
    vlm: 0.1
  repeated_diffusion_steps: 4
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
