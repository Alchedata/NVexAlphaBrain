# DEPRECATED: This file is deprecated. Please use configs/finetune_config.yaml instead.
# Kept for reference to see the full parameter combination for QwenAdapter_LIBERO.

# QwenAdapter + LIBERO
_model_config_: configs/models/qwen_adapter.yaml

run_id: alphabrain
output_root_dir: path/to/result
seed: 42
is_debug: false

framework:
  qwenvl:
    base_vlm: ./data/pretrained_models/Qwen2.5-VL-3B-Instruct-Action

datasets:
  vla_data:
    dataloader_module: lerobot_datasets
    data_root_dir: data/datasets/LEROBOT_LIBERO_DATA
    dataset_mix: libero_all
    action_type: delta_qpos
    CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
    CoT_answer: bbox
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 16
    load_all_data_for_training: true
    obs: ["image_0"]
    video_backend: torchvision_av


trainer:
  epochs: 100
  max_train_steps: 100000
  num_warmup_steps: 5000
  save_interval: 5000
  eval_interval: 100
  learning_rate:
    base: 2.0e-05
    qwen_vl_interface: 2.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: constant
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ''
  loss_scale:
    vla: 1.0
    vlm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  save_format: pt
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
