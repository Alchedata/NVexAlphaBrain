run_id: alphabrain_neurovla
output_root_dir: results/training
seed: 42
trackers: [jsonl, wandb]
wandb_entity: your_wandb_entity
wandb_project: llavavla
is_debug: false


framework:
  name: NeuroVLA
  qwenvl:
    base_vlm: ./data/pretrained_models/Qwen2.5-VL-3B-Instruct-Action
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
  layer_qformer:
    qformer_start_layer: -6
    qformer_end_layer: -1
    num_query_tokens: 4
    input_dim: 2048        # Qwen2.5-VL-3B hidden dim
    ouptput_dim: 768       # QFormer output dim (matches action_model input_dim)
  reduce_in_full_precision: true


datasets:
  vla_data:
    dataloader_module: lerobot_datasets
    data_root_dir: data/datasets/LEROBOT_LIBERO_DATA
    dataset_mix: libero_goal
    action_type: delta_qpos
    sequential_step_sampling: False
    CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
    CoT_answer: bbox
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 16
    load_all_data_for_training: true
    obs: ["image_0"]
    video_backend: torchvision_av
    include_state: true


trainer:
  epochs: 100
  max_train_steps: 100000
  num_warmup_steps: 5000
  save_interval: 5000
  eval_interval: 100
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    layer_qformer: 5.0e-05
    action_model: 1.0e-04
    edit_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ''
  loss_scale:
    vla: 1.0
    vlm: 0.1
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  # parameters to be determined
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
